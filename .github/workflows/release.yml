name: Release Workflow

on:
  push:
    tags:
      - 'v*.*.*' # Trigger only when a version tag like v0.15.0 is pushed

jobs:
  build_and_release:
    name: Build & Release Extension
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to create a GitHub Release

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Format & Lint Check
        run: |
          npm run format
          npm run lint

      - name: Run Multi-Stage Tests
        run: npm test

      - name: Build Browser Extension
        run: npm run build
        
      - name: Extract Version
        id: extract_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_ENV

      - name: Publish Release & Upload Asset
        uses: softprops/action-gh-release@v2
        with:
          name: Notion Enhanced v${{ env.VERSION }}
          draft: false
          prerelease: false
          files: dist/notion-enhanced-${{ env.VERSION }}.zip
          generate_release_notes: true
